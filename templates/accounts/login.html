{% extends "base_auth.html" %}

{% block title %}Log in — Kira{% endblock %}

{% block content %}
<article>
  <header><h1>Log in</h1></header>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
  </form>
  <p class="kira-muted">No account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
</article>
{% endblock %}
